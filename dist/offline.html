<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NILL – Kein Internet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #040407;
      color: #efede7;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.035);
      border: 1px solid rgba(239, 237, 231, 0.07);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #c5a572;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      color: #040407;
      letter-spacing: -0.02em;
    }

    .logo-text {
      font-size: 1.15rem;
      font-weight: 800;
      color: #c5a572;
      letter-spacing: 0.07em;
    }

    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.2);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: #efede7;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }

    p {
      font-size: 0.875rem;
      color: rgba(239, 237, 231, 0.5);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.7rem 1.5rem;
      background: #c5a572;
      color: #040407;
      font-size: 0.875rem;
      font-weight: 700;
      border: none;
      border-radius: 99px;
      cursor: pointer;
      transition: opacity 0.2s;
      text-decoration: none;
    }

    .btn:hover { opacity: 0.85; }

    .hint {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: rgba(239, 237, 231, 0.25);
    }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.25rem; border-radius: 16px; }
    }
  </style>
</head>
<body>
  <div class="card">

    <div class="logo">
      <div class="logo-mark">N</div>
      <span class="logo-text">NILL</span>
    </div>

    <div class="icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none"
        stroke="#f87171" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>Keine Verbindung</h1>
    <p>
      Du bist gerade offline. Überprüfe deine<br />
      Internetverbindung und versuche es erneut.
    </p>

    <a href="/" class="btn" onclick="window.location.reload(); return false;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Erneut versuchen
    </a>

    <p class="hint">Gecachte Seiten sind weiterhin verfügbar.</p>

  </div>
</body>
</html>
